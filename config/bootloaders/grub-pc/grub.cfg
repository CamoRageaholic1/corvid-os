# =============================================================================
# Corvid OS -- GRUB (UEFI) boot menu config
# =============================================================================
# WHY THIS FILE EXISTS
#   live-build's `binary_loopback_cfg` build step generates the ISO's
#   /boot/grub/grub.cfg by copying a template out of a bootloader skeleton and
#   substituting the LINUX_LIVE / LINUX_INSTALL / MEMTEST placeholders with the
#   real kernel menu entries. It picks the template like this:
#
#       if [ -e "config/bootloaders/grub-pc" ]; then
#           _SOURCE="config/bootloaders/grub-pc"          # <-- THIS FILE
#       else
#           _SOURCE=".../share/live/build/bootloaders/grub-pc"   # stock
#       fi
#       cp -a "${_SOURCE}"/* binary/boot/grub/
#
#   The grub-efi (UEFI) bootloader does NOT ship its own menu config -- its EFI
#   binary chains to /boot/grub/grub.cfg. So this one file themes BOTH the BIOS
#   grub path and the UEFI grub path. binary_loopback_cfg runs unconditionally,
#   even though auto/config only enables `--bootloaders syslinux,grub-efi`.
#
#   This is a VERBATIM copy of the stock live-build grub-pc template with ONE
#   functional change: the two `set theme=` lines now point at the branded
#   theme (/boot/grub/theme.txt, staged by branding/generate-assets.sh via
#   config/includes.binary/boot/grub/) instead of live-build's default
#   /boot/grub/live-theme/theme.txt. Without this file, the branded theme.txt
#   is copied onto the ISO but NEVER loaded.
#
#   Because binary_loopback_cfg copies ONLY this directory's contents (it does
#   not merge with the stock skeleton), the DejaVu .pf2 fonts the template
#   loadfont's are carried alongside this file so font rendering is not
#   regressed. splash.png and the (now unused) live-theme/ dir are intentionally
#   omitted -- the branded splash.png + theme.txt come from
#   config/includes.binary/boot/grub/.
#
#   DO NOT edit the bare placeholder tokens LINUX_LIVE, LINUX_INSTALL,
#   LINUX_ADVANCED_INSTALL and MEMTEST below -- live-build sed-substitutes them.
#
# ---------------------------------------------------------------------------
# TODO (MUST BE CONFIRMED ON THE BUILD VM -- do not assume):
#   1. SKELETON PARITY. This template is copied from live-build's Ubuntu source
#      (share/live/build/bootloaders/grub-pc/grub.cfg, blob
#      a809375077fc01be85899879c43f7e3c7f144831). The template can differ
#      between live-build releases. On the build VM, diff this file against the
#      INSTALLED stock template before trusting it:
#         diff config/bootloaders/grub-pc/grub.cfg \
#              /usr/share/live/build/bootloaders/grub-pc/grub.cfg
#      If they differ beyond the two `set theme=` lines, re-sync this file to the
#      installed version and re-apply ONLY the theme-path change.
#   2. THEME FONT. The /boot/grub/theme.txt file requests font "Unifont Regular
#      16". That name is provided by GRUB's unicode.pf2, which the `loadfont`
#      line below references but which is NOT shipped in this dir. Confirm
#      /boot/grub/unicode.pf2 lands on the ISO (grub-common usually provides it);
#      if not, either add unicode.pf2 here or change the theme.txt font to
#      "DejaVu Sans Bold 16" (provided by dejavu-bold-16.pf2, shipped here).
#      If neither font is present GRUB still boots -- it silently falls back to
#      its built-in font, so this affects menu appearance only, not bootability.
# =============================================================================
set default=0

loadfont $prefix/dejavu-bold-16.pf2
loadfont $prefix/dejavu-bold-14.pf2
loadfont $prefix/unicode.pf2
set gfxmode=auto
insmod all_video
insmod gfxterm
insmod png

set color_normal=light-gray/black
set color_highlight=white/black

if [ -e /isolinux/splash.png ]; then
    # binary_syslinux modifies the theme file to point to the correct
    # background picture
    set theme=/boot/grub/theme.txt
elif [ -e /boot/grub/splash.png ]; then
    set theme=/boot/grub/theme.txt
else
    set menu_color_normal=cyan/blue
    set menu_color_highlight=white/blue
fi

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1

# Live boot
LINUX_LIVE

# You can add more entries like this
# menuentry "Alternate live boot" {
# linux KERNEL_LIVE APPEND_LIVE custom options here
# initrd INITRD_LIVE
# }
# menuentry "Alternate graphical installer" {
# linux KERNEL_GI APPEND_GI custom options here
# initrd INITRD_GI
# }
# menuentry "Alternate textual installer" {
# linux KERNEL_DI APPEND_DI custom options here
# initrd INITRD_DI
# }

# Installer (if any)
LINUX_INSTALL

submenu 'Advanced options...' {

# More installer entries (if any)
LINUX_ADVANCED_INSTALL

# Memtest (if any)
MEMTEST

}
