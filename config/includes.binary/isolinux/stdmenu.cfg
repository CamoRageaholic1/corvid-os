# =============================================================================
# Corvid OS — isolinux/syslinux menu styling
# =============================================================================
# live-build's generated isolinux.cfg `include`s this shared styling file (it
# does NOT contain the boot ENTRIES — those are generated by live-build), so
# overriding it here brands the BIOS boot menu safely without touching the entry
# list. The background image is isolinux/splash.png (staged by generate-assets).
#
# The MENU TITLE below is templated from branding/os-release by
# generate-assets.sh; "Corvid OS" is the static fallback.
#
# NOTE: the entry LABELS ("Live", "Install…") and the ISO volume/application id
# are produced by live-build from the `lb config` options in auto/config —
# keep the exact text in sync there.
# -----------------------------------------------------------------------------
MENU TITLE Corvid OS
MENU BACKGROUND splash.png
MENU RESOLUTION 640 480

# element              ansi        foreground   background   shadow
MENU COLOR title       1;36;44     #ff27e0c8    #00000000    std
MENU COLOR sel         7;37;40     #ffe8ecf4    #80111622    all
MENU COLOR unsel       37;44       #ff6b768c    #00000000    std
MENU COLOR hotsel      1;7;37;40   #ff27e0c8    #80111622    all
MENU COLOR hotkey      1;37;44     #ff27e0c8    #00000000    std
MENU COLOR border      30;44       #00000000    #00000000    none
MENU COLOR scrollbar   30;44       #ff3a4459    #00000000    none
MENU COLOR tabmsg      31;40       #ff6b768c    #00000000    std
MENU COLOR timeout_msg 37;40       #ff6b768c    #00000000    std
MENU COLOR timeout     1;37;40     #ff27e0c8    #00000000    std
MENU COLOR help        37;40       #ff6b768c    #00000000    std

MENU MARGIN 8
MENU VSHIFT 11
MENU ROWS 8
MENU TABMSGROW 20
MENU TIMEOUTROW 22
MENU WIDTH 78
