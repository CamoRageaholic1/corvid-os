# =============================================================================
# Corvid OS - Kernel hardening sysctl profile
# Security DNA component. File ships to /etc/sysctl.d/90-corvid-hardening.conf
# Applied at boot by systemd-sysctl (and by `sysctl --system`).
# -----------------------------------------------------------------------------
# IMPORTANT CONTEXT: Corvid is a PENTEST distribution. The goal here is a strong
# baseline that does NOT break the offensive-security toolset or the dev stack
# (Docker, distrobox, rootless containers). Every setting that carries a real
# tradeoff for a pentester is called out inline with the exact override command.
# Numeric prefix 90- means these values load LATE and win over most distro
# defaults; a user who wants to relax one can drop a 99-*.conf that loads after.
# =============================================================================


# -----------------------------------------------------------------------------
# 1. Kernel-pointer / log / memory information leaks
# -----------------------------------------------------------------------------

# Hide kernel pointers (/proc, dmesg, etc.) from ALL users, even root-owned
# reads by unprivileged tooling. 2 = always mask %pK pointers.
kernel.kptr_restrict = 2

# Restrict dmesg (the kernel ring buffer) to root only. Blocks unprivileged
# users from reading kernel messages that leak addresses / hardware layout.
kernel.dmesg_restrict = 1

# Address Space Layout Randomization: full randomization of stack, mmap, brk,
# VDSO and the executable base (for PIE binaries). This is the max setting.
kernel.randomize_va_space = 2

# Don't let SUID programs produce core dumps (they can contain secrets).
fs.suid_dumpable = 0


# -----------------------------------------------------------------------------
# 2. ptrace scope  --  *** PENTEST TRADEOFF DECISION ***
# -----------------------------------------------------------------------------
# Yama ptrace_scope controls who may ptrace() (attach to) a running process.
#   0 = classic Linux (any process may trace another of the same uid)
#   1 = "restricted" (only a parent may trace its children, or a process that
#        called PR_SET_PTRACER); this stops cross-process credential scraping
#   2 = "admin-only" (only CAP_SYS_PTRACE / root may ptrace at all)
#   3 = no ptrace at all (irreversible until reboot)
#
# DECISION: we ship **1**, NOT 2.
#   Why not 2: a pentest box legitimately runs debuggers and DBI tooling
#   (gdb, radare2/rizin, gef, ltrace/strace, drozer, frida-style attach,
#   Ghidra debugger bridges). ptrace_scope=2 forces every one of those to be
#   run as root, which is friction and pushes users toward `sudo` habits that
#   are worse for security than the setting buys us.
#   Why not 0: 0 lets any same-uid process silently read another's memory,
#   which is exactly the local credential-theft primitive we want to blunt.
#   1 is the sweet spot: normal debugging of your OWN children still works;
#   opportunistic cross-process memory scraping does not.
# To fully lock down (accepting the debugger friction): set to 2.
# To debug an already-running unrelated PID as non-root: temporarily `sudo
# sysctl kernel.yama.ptrace_scope=0` for that session.
kernel.yama.ptrace_scope = 1


# -----------------------------------------------------------------------------
# 3. Kernel attack-surface reduction
# -----------------------------------------------------------------------------

# Disable kexec: stops loading a new/unsigned kernel over the running one at
# runtime (a classic post-exploitation persistence + Secure-Boot-bypass vector).
# Irreversible until reboot. No impact on normal pentest work.
kernel.kexec_load_disabled = 1

# Forbid unprivileged eBPF program loading. Unprivileged BPF has been a rich
# source of LPE bugs. Root/CAP_BPF tooling still works.
# TRADEOFF: if you develop/run *unprivileged* BPF tooling, run it as root or
# set this to 0. Privileged bpftrace/bcc/tcpdump are unaffected.
kernel.unprivileged_bpf_disabled = 1

# Harden the BPF JIT against spraying: constant blinding + related mitigations.
# 2 = harden for all users. Privileged BPF still functions, just harder to abuse.
net.core.bpf_jit_harden = 2

# NOTE (intentionally NOT set): kernel.unprivileged_userns_clone
#   We deliberately DO NOT disable unprivileged user namespaces. distrobox,
#   rootless Docker/Podman, bubblewrap sandboxes, and the Chromium sandbox all
#   depend on them. Disabling would break big parts of the dev + tooling stack.
#   Accept the (small) added kernel surface here as a documented tradeoff.


# -----------------------------------------------------------------------------
# 4. Filesystem hardening (link / FIFO / regular-file protections)
# -----------------------------------------------------------------------------
# These stop a whole class of /tmp symlink & hardlink race exploits and unsafe
# writes into attacker-controlled FIFOs/regular files in sticky world-writable
# dirs. Ubuntu already defaults most to on; we pin them explicitly.
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 1
fs.protected_regular = 2


# -----------------------------------------------------------------------------
# 5. IPv4 network hardening
# -----------------------------------------------------------------------------

# SYN cookies: survive SYN-flood conditions without dropping legit connections.
net.ipv4.tcp_syncookies = 1

# Protect against TCP time-wait assassination (RFC 1337).
net.ipv4.tcp_rfc1337 = 1

# Reverse-path filtering (anti-spoofing). 1 = strict RFC3704 mode.
# *** PENTEST TRADEOFF ***: strict rp_filter DROPS packets that arrive on an
# interface the kernel wouldn't route the reply back out. That breaks/limits
# MITM, routing, multi-homed and interception setups (responder, bettercap,
# ettercap, mitm6, arpspoof, custom gateways).
#   If you are doing on-path / MITM work, relax it for the interface in play:
#     sudo sysctl net.ipv4.conf.all.rp_filter=2      # loose mode, or
#     sudo sysctl net.ipv4.conf.<iface>.rp_filter=0  # off for one nic
# We keep STRICT as the hardened default; flip it per-engagement, not globally.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignore ICMP echo to broadcast (smurf-attack amplifier) and bogus ICMP errors.
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Do not accept ICMP redirects (route-injection / MITM primitive) and do not
# send them (we are not a router by default). Same for "secure" redirects.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reject source-routed packets (used to bypass path controls / spoof).
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Log "martian" packets (impossible src/dst addresses) for visibility.
# *** PENTEST TRADEOFF ***: on a box that scans/sweeps networks this can be
# NOISY in the kernel log. Left ON for defensive value; if it floods your
# journal during a scan, set both to 0 for that session.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# NOTE (intentionally NOT set): net.ipv4.ip_forward
#   A hardened host would set this to 0. We DON'T pin it because (a) Docker
#   toggles it to 1 for container networking and would fight us, and (b) MITM
#   / pivoting tooling needs forwarding. It stays at the running default (0 on
#   a fresh boot) and whoever needs routing enables it deliberately.


# -----------------------------------------------------------------------------
# 6. IPv6 network hardening
# -----------------------------------------------------------------------------
# Turn off IPv6 Router Advertisement autoconfig and redirects. This blunts
# rogue-RA / mitm6-style attacks *against this host*.
# *** PENTEST TRADEOFF ***: if YOUR OWN network relies on SLAAC/RA to hand you
# an IPv6 address, this box won't autoconfigure v6. Re-enable per interface:
#   sudo sysctl net.ipv6.conf.<iface>.accept_ra=1
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# =============================================================================
# End of Corvid hardening profile.
# Reload without reboot:  sudo sysctl --system
# Inspect one value:      sysctl kernel.yama.ptrace_scope
# Per-engagement relax:   drop /etc/sysctl.d/99-pentest-relax.conf (loads later)
# =============================================================================
