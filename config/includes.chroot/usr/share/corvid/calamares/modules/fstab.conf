# =============================================================================
# Corvid OS — fstab module
# =============================================================================
mountOptions:
    default:        defaults,noatime
    btrfs:          defaults,noatime,compress=zstd
    ssdExtraMountOptions:
        ext4:       commit=120
        btrfs:      ssd,discard=async

# crypttab: with LUKS FDE the module writes the mapping so the root unlocks at
# boot. "luks" keyword lets systemd/initramfs prompt (Plymouth handles the UI).
crypttabOptions: luks
