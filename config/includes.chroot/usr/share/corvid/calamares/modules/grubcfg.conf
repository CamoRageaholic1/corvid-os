# =============================================================================
# Corvid OS — grubcfg module (writes /etc/default/grub before grub-mkconfig)
# =============================================================================
overwrite: false

defaults:
    GRUB_TIMEOUT: 5
    GRUB_TIMEOUT_STYLE: "menu"
    # Quiet, branded boot with the Corvid Plymouth splash.
    GRUB_CMDLINE_LINUX_DEFAULT: "quiet splash"
    GRUB_CMDLINE_LINUX: ""
    GRUB_DISABLE_OS_PROBER: "false"

# Keep the distributor string in sync with the product name.
removeMenuTitle:  false
