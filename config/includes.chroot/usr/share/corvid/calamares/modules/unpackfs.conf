# =============================================================================
# Corvid OS — unpackfs module (offline install: copy the live squashfs to disk)
# =============================================================================
# This is what makes the install OFFLINE — the root filesystem is unpacked from
# the ISO's compressed image rather than downloaded. The source path is the
# standard live-build/casper location for the filesystem image.
# -----------------------------------------------------------------------------
unpack:
    - source: "/run/live/medium/live/filesystem.squashfs"
      sourcefs: "squashfs"
      destination: ""
