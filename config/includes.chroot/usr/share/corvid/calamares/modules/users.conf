# =============================================================================
# Corvid OS — users module
# =============================================================================
defaultGroups:
    - adm
    - cdrom
    - sudo
    - dip
    - plugdev
    - lpadmin
    - users

autologinGroup:  autologin
sudoersGroup:    sudo

# Primary user gets sudo; the root account is left password-locked so admin is
# performed via sudo (hardened default, matches the security-DNA of the distro).
setRootPassword:      false
doAutologin:          false

# Password policy for the created user.
passwordRequirements:
    minLength: 8
    maxLength: -1
    libpwquality:
        - minlen=8
        - minclass=2

# Hostname handling.
user:
    shell: /bin/bash
    forbidden_names:
        - root
        - admin

setHostname: EtcFile
hostname:
    location: EtcFile
    writeHostsFile: true
