<?xml version="1.0" encoding="UTF-8"?>
<!--
  Corvid OS — canonical vector wordmark / logo (hand-authored, source of truth).
  Rasterized to PNG by generate-assets.sh on the build VM (rsvg-convert/convert).
  Palette: near-black indigo base, steel feather, electric-cyan accent.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0C12"/>
      <stop offset="1" stop-color="#111622"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- angular raven mark: a stylized bird in flight, one cyan eye -->
  <g fill="none" stroke="#E8ECF4" stroke-width="10" stroke-linejoin="round" stroke-linecap="round">
    <!-- left wing -->
    <path d="M256 300 L150 210 L206 236 L176 168 L232 220"/>
    <!-- right wing -->
    <path d="M256 300 L362 210 L306 236 L336 168 L280 220"/>
    <!-- body + tail -->
    <path d="M256 300 L256 372 L236 344 M256 372 L276 344"/>
  </g>
  <!-- head + beak -->
  <path d="M256 300 L300 264 L262 286 Z" fill="#E8ECF4"/>
  <!-- cyan eye / spark -->
  <circle cx="284" cy="282" r="9" fill="#27E0C8"/>

  <!-- accent bar -->
  <rect x="150" y="404" width="212" height="6" rx="3" fill="#27E0C8"/>
</svg>
