# =============================================================================
# Corvid OS — Calamares main settings (module sequence)
# =============================================================================
# Offline KDE install. Full-disk LUKS encryption is the DEFAULT partitioning
# path (see modules/partition.conf).
#
# Installed to /etc/calamares/settings.conf by the branding hook
# (config/hooks/live/0600-branding.hook.chroot).
# ---
# Where Calamares looks for module .conf files. "local" == the modules/ dir
# next to this settings.conf (i.e. /etc/calamares/modules).
modules-search: [ local, /usr/lib/x86_64-linux-gnu/calamares/modules, /usr/lib/calamares/modules ]

# Instances: only needed when a module runs more than once. Defaults are fine.

# -----------------------------------------------------------------------------
# The install sequence: show pages -> run exec jobs -> show the finished page.
# -----------------------------------------------------------------------------
sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - luksbootkeyfile
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - initramfscfg
  - initramfs
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

# -----------------------------------------------------------------------------
# Branding component to load (calamares/branding/corvid/branding.desc).
# -----------------------------------------------------------------------------
branding: corvid

# Require pressing "Install" on the summary page before changes are written.
prompt-install: true

# We are installing a real system (not just configuring the live env).
dont-chroot: false

# Leave the machine running (do not power off) when the installer quits.
disable-cancel: false
disable-cancel-during-exec: false
