# =============================================================================
# Corvid OS — partition module  (LUKS FULL-DISK ENCRYPTION = DEFAULT)
# =============================================================================
# This is the security-DNA line item from SPEC §2: LUKS-default installer.
#
# HOW THE DEFAULT WORKS:
#   * enableLuksAutomatedPartitioning: true  -> the "Erase disk" automated flow
#     exposes the "Encrypt system" option and, because a passphrase field is
#     shown up front, guides the user into an encrypted install.
#   * luksGeneration: luks2                  -> modern LUKS2 header/PBKDF.
#   * initialSwapChoice: file                -> swap lives INSIDE the encrypted
#     root as a swapfile, so it is encrypted for free (no cleartext swap).
#
# NOTE: mainline Calamares has no key to force the encryption checkbox
# pre-checked; the standard levers are the two below. If we want the
# checkbox *hard-defaulted to on* (truly un-missable), that needs either a
# small downstream Calamares patch or the KPMcore "erase+encrypt" preset.
# The config here makes encryption the obvious, promoted path.
# -----------------------------------------------------------------------------

efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: 512MiB
efiSystemPartitionName: EFI

# Filesystem for the root partition.
defaultFileSystemType:  "ext4"
availableFileSystemTypes: [ "ext4", "btrfs", "xfs" ]

# --- Encryption -------------------------------------------------------------
enableLuksAutomatedPartitioning: true
luksGeneration: luks2

# --- Swap -------------------------------------------------------------------
# "file" => encrypted swapfile inside the encrypted root (recommended for FDE).
initialSwapChoice: file
initialPartitioningChoice: erase

# Allow the advanced user to still hand-craft partitions (encryption stays
# available in manual mode too).
allowManualPartitioning: true

# Cosmetic / behaviour.
alwaysShowPartitionLabels: true
drawNestedPartitions:      false
requiredStorage:           15.0

# GPT partition-table attributes / bios-boot handling left at sane defaults.
