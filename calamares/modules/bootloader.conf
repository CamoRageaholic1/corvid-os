# =============================================================================
# Corvid OS — bootloader module (GRUB, BIOS + UEFI)
# =============================================================================
# Secure Boot is deferred in v1 (SPEC §2); no shim/MOK here. The MOK-enrollment
# path is documented in docs/ROADMAP.md.
#
# efiBootloaderId is derived from the product short-name; the branding hook can
# template it, but "Corvid" is a safe literal.
# -----------------------------------------------------------------------------

efiBootLoader:      "grub"

# GRUB tooling (Ubuntu/Debian names).
grubInstall:        "grub-install"
grubMkconfig:       "grub-mkconfig"
grubCfg:            "/boot/grub/grub.cfg"
grubProbe:          "grub-probe"

# EFI specifics.
efiBootloaderId:    "Corvid"
installEFIFallback: true

# BIOS specifics handled by grub-install to the target disk (set by partition).
