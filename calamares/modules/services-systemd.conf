# =============================================================================
# Corvid OS — services-systemd module
# =============================================================================
# Ensure the login manager and network stack come up on the installed system.
# Security services (AppArmor, AnonSurf, etc.) are enabled by hooks in the
# live image and carry over into the install; nothing to force here.
# -----------------------------------------------------------------------------
services:
    - name: sddm
      mandatory: false
    - name: NetworkManager
      mandatory: false

targets:
    - name: graphical.target
      mandatory: false

disable: []
